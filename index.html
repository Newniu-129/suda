<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>一溯答</title>
<style>
body {
  text-align: center;
  font-family: Arial;
  background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  justify-content: center;
}

h2 {
  margin-top: 15px;
  margin-bottom: 15px;
  letter-spacing: 4px;
  font-size: 24px;
}

.game-container {
  display: inline-block;
  margin-top: 10px;
  padding: 15px 20px 20px;
  background: #ffffff;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
}

.areas {
  margin-bottom: 10px;
}

#areaA,
#areaB {
  font-size: 22px;
  margin: 8px 0;
  padding: 8px 12px;
  border-radius: 10px;
  min-height: 50px;
  box-sizing: border-box;
  overflow: hidden;
}

/* 撤销第二条改动：移除flexbox布局，恢复原始布局 */
.area-inner {
/* display: flex; */
/* justify-content: space-between; */
/* align-items: center; */
}

.question-number {
/* flex-shrink: 0; */
/* text-align: left; */
/* min-width: 80px; */
}

.question-content {
/* flex-grow: 1; */
/* text-align: right; */
}

#areaA {
  background: #f5f9ff;
  border: 1px solid #c8ddff;
}

#areaB {
  background: #fffaf5;
  border: 1px solid #ffd9b3;
}

#answerDisplay {
  min-height: 20px;
  margin: 8px 0 0;
  font-size: 16px;
  color: #888;
}

#keypad {
  margin-top: 10px;
  display: inline-grid;
  grid-template-columns: repeat(3, 60px);
  grid-gap: 6px;
}

#keypad .keypad-empty {
  width: 60px;
  height: 60px;
  pointer-events: none;
}

#keypad button {
  width: 60px;
  height: 60px;
  font-size: 20px;
  border-radius: 10px;
  border: none;
  background: #f3f4f6;
  box-shadow: 0 3px 0 #d1d5db;
  cursor: pointer;
  transition: all 0.1s ease;
}

#keypad button:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 #d1d5db;
}

#control {
  margin-top: 12px;
}

#control button {
  margin: 4px;
  padding: 6px 14px;
  border-radius: 18px;
  border: none;
  cursor: pointer;
  background: #4f46e5;
  color: #ffffff;
  font-size: 13px;
}

#control button:nth-child(2),
#control button:nth-child(3) {
  background: #e5e7eb;
  color: #111827;
}

#pauseBtn.is-paused {
  background: #f59e0b !important;
  color: #111827 !important;
}

#result {
  margin-top: 8px;
  min-height: 20px;
  font-size: 16px;
}

/* 起始界面磨砂覆盖层 */
#startOverlay {
  display: flex;
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 101;
  align-items: center;
  justify-content: center;
}

.start-overlay-content {
  background: #fff;
  border-radius: 20px;
  padding: 40px 50px;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
  text-align: center;
}

.start-title {
  font-size: 36px;
  font-weight: 700;
  color: #4f46e5;
  margin-bottom: 30px;
  letter-spacing: 4px;
}

.start-overlay-content button {
  padding: 15px 35px;
  border-radius: 25px;
  border: none;
  background: #4f46e5;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.start-overlay-content button:hover {
  background: #3730a3;
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
}

/* 结束磨砂覆盖层 */
#endOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 100;
  align-items: center;
  justify-content: center;
}

#endOverlay.show {
  display: flex;
}

.end-overlay-content {
  background: #fff;
  border-radius: 20px;
  padding: 24px 32px;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
  text-align: center;
}

.end-result-row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 16px;
  font-size: 24px;
  max-width: 480px;
}

.end-rate {
  font-size: 36px;
  font-weight: 700;
  color: #4f46e5;
  margin-bottom: 20px;
}

.end-overlay-content button {
  margin: 5px;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #4f46e5;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
}

.end-overlay-content button:nth-child(3) {
  background: #e5e7eb;
  color: #111827;
}
</style>
</head>

<body>

<h2 id="levelTitle">一溯答</h2>

<div class="game-container">
  <div class="areas">
    <div id="areaA"><span class="area-inner"></span></div>
    <div id="areaB"><span class="area-inner"></span></div>
    <div id="answerDisplay"></div>
  </div>

  <div id="keypad"></div>

  <div id="control">
    <button id="pauseBtn" onclick="pauseGame()">暂停</button>
    <button id="endBtn" onclick="giveUp()">结束游戏</button>
  </div>

  <div id="result"></div>
</div>

<!-- 起始界面 -->
<div id="startOverlay">
  <div class="start-overlay-content">
    <div class="start-title">溯答计算</div>
    <button id="startGameBtn" type="button" onclick="startGameFromOverlay()">开始游戏</button>
  </div>
</div>

<!-- 结束界面 -->
<div id="endOverlay">
  <div class="end-overlay-content">
    <div id="endResultRow" class="end-result-row"></div>
    <div id="endRate" class="end-rate"></div>
    <button id="overlayStartBtn" type="button" onclick="closeOverlayAndStart()">开始游戏</button>
    <button id="overlayEndBtn" type="button" onclick="closeOverlayAndEnd()">结束游戏</button>
  </div>
</div>

<script>
// 创建音频上下文和音效
const audioContext = new (window.AudioContext || window.webkitAudioContext)();

// 音效函数
function playSound(frequency, duration, type = 'sine') {
  const oscillator = audioContext.createOscillator();
  const gainNode = audioContext.createGain();
  
  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);
  
  oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
  oscillator.type = type;
  
  gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
  
  oscillator.start(audioContext.currentTime);
  oscillator.stop(audioContext.currentTime + duration);
}

// 开始音效（高音）
function playStartSound() {
  playSound(800, 0.1);
  setTimeout(() => playSound(1000, 0.1), 100);
}

// 正确音效（上升音调）- 缩短版本
function playCorrectSound() {
  playSound(600, 0.08);
  setTimeout(() => playSound(800, 0.08), 80);
  setTimeout(() => playSound(1000, 0.1), 160);
}

// 错误音效（低音）
function playErrorSound() {
  playSound(200, 0.3, 'sawtooth');
}

// 溯答：看第 N 题，答第 N-L 题（每次仅答一题），5 秒一轮
// 题量：一溯答 20 题；每升一级 +2 题（22/24/26）

const LEVEL_NAMES = ["", "一溯答", "二溯答", "三溯答", "四溯答"];
let questions = [];
let currentIndex = 0;
let correctCount = 0;
let timer = null;
const TIME_LIMIT = 5000;
let gameRunning = false;
let paused = false;
let totalQuestions = 20;
let currentLevel = 1; // 1~4：一/二/三/四溯答（L=1/2/3/4）
let lastGameRate = null; // 结算后若 >=85 则可进入下一关
let questionResults = []; // 每题对错，用于结算展示 ✅/❌
let hasAttemptThisStep = false;

function computeTotalQuestions() {
  return 20 + (currentLevel - 1) * 2;
}

function updateActionButtons() {
  const label =
    lastGameRate === null
      ? "开始游戏"
      : (lastGameRate >= 85 ? "下一关" : "再来一次");
  const overlayStartBtn = document.getElementById("overlayStartBtn");
  if (overlayStartBtn) overlayStartBtn.innerText = label;
}

// 生成题目（所有数字 0-9）
function generateQuestions() {
  questions = [];
  for (let i = 0; i < totalQuestions; i++) {
    const isAdd = Math.random() < 0.5;
    let a, b, ans, op;
    if (isAdd) {
      op = "+";
      a = Math.floor(Math.random() * 10);
      b = Math.floor(Math.random() * (10 - a));
      ans = a + b;
    } else {
      op = "-";
      a = Math.floor(Math.random() * 10);
      b = Math.floor(Math.random() * (a + 1));
      ans = a - b;
    }
    questions.push({ a, b, op, text: a + " " + op + " " + b, answer: ans });
  }
}

function setAreaContent(areaId, html) {
  const area = document.getElementById(areaId);
  const inner = area ? area.querySelector(".area-inner") : null;
  if (inner) inner.innerHTML = html;
}

function startGameFromOverlay() {
  document.getElementById("startOverlay").style.display = "none";
  startGame();
}

function startGame() {
  document.getElementById("endOverlay").classList.remove("show");
  if (lastGameRate !== null && lastGameRate >= 85) currentLevel = Math.min(currentLevel + 1, 4);

  totalQuestions = computeTotalQuestions();
  updateActionButtons();

  document.getElementById("levelTitle").innerText = LEVEL_NAMES[currentLevel];
  questionResults = new Array(totalQuestions).fill(null);
  generateQuestions();
  currentIndex = 0;
  correctCount = 0;
  hasAttemptThisStep = false;
  gameRunning = true;
  paused = false;
  document.getElementById("result").innerText = "";
  document.getElementById("answerDisplay").innerText = "";
  document.getElementById("pauseBtn").classList.remove("is-paused");
  showQuestion();
}

function pauseGame() {
  if (!gameRunning) return;
  paused = !paused;
  const btn = document.getElementById("pauseBtn");
  if (btn) btn.classList.toggle("is-paused", paused);
  if (paused) {
    clearTimeout(timer);
  } else {
    startTimer();
  }
}

function giveUp() {
  if (!gameRunning) return;
  endGame();
}

// 当前这一步要回答哪一题：看第 N 题，答第 N-L 题（每次只答一题）
function getTargetInfo() {
  const L = currentLevel;
  const targetIndex = currentIndex - L;
  if (targetIndex < 0 || targetIndex >= totalQuestions) return null;
  return { targetIndex, labelNumber: targetIndex + 1 };
}

function renderMaskedB() {
  const info = getTargetInfo();
  if (!info) return "";
  const q = questions[info.targetIndex];
  return `第 ${info.labelNumber} 题：? ? ? = ?`;
}

function renderCandidateB(ans) {
  const info = getTargetInfo();
  if (!info) return "";
  const q = questions[info.targetIndex];
  return `第 ${info.labelNumber} 题：? ? ? = ${ans}`;
}

function renderRevealedB() {
  const info = getTargetInfo();
  if (!info) return "";
  const q = questions[info.targetIndex];
  return `第 ${info.labelNumber} 题：${q.a} ${q.op} ${q.b} = ${q.answer}`;
}

function renderTimeoutB() {
  const info = getTargetInfo();
  if (!info) return "";
  const q = questions[info.targetIndex];
  return `第 ${info.labelNumber} 题：${q.a} ${q.op} ${q.b} = ${q.answer} ❌`;
}

function showQuestion() {
  if (!gameRunning) return;
  // 总轮数 = 题目数 + L（末尾补答剩余题）
  if (currentIndex >= totalQuestions + currentLevel) {
    endGame();
    return;
  }

  hasAttemptThisStep = false;
  document.getElementById("result").innerText = "";

  if (currentIndex < totalQuestions) {
    const q = questions[currentIndex];
    setAreaContent("areaA", `第 ${currentIndex + 1} 题：${q.text} = ?`);
  } else {
    setAreaContent("areaA", "");
  }
  setAreaContent("areaB", renderMaskedB());

  // 播放开始音效
  playStartSound();
  startTimer();
}

function startTimer() {
  clearTimeout(timer);
  timer = setTimeout(function () {
    if (!gameRunning) return;
    const info = getTargetInfo();
    if (!info) {
      gotoNextStep();
      return;
    }
    if (questionResults[info.targetIndex] === null) questionResults[info.targetIndex] = false;
    
    // 显示超时错误，包括正确算式和❌标识
    setAreaContent("areaB", renderTimeoutB());
    
    // 播放超时错误音效
    playErrorSound();
    
    setTimeout(function () {
      gotoNextStep();
    }, 1500);
  }, TIME_LIMIT);
}

function inputNumber(num) {
  if (!gameRunning || paused) return;
  const info = getTargetInfo();
  if (!info) return;

  // 如果该题已经被记录过结果（超时/已判对），本轮不再作答
  if (questionResults[info.targetIndex] === true || questionResults[info.targetIndex] === false) return;

  hasAttemptThisStep = true;
  setAreaContent("areaB", renderCandidateB(num));

  const correctAnswer = questions[info.targetIndex].answer;
  if (num === correctAnswer) {
    questionResults[info.targetIndex] = true;
    correctCount += 1;
    setAreaContent("areaB", renderRevealedB());
    
    // 播放正确音效
    playCorrectSound();
    
    clearTimeout(timer);
    setTimeout(function () {
      gotoNextStep();
    }, 600);
  } else {
    // 5秒内答错不显示❌，只重置显示
    setTimeout(function () {
      setAreaContent("areaB", renderMaskedB());
    }, 300);
  }
}

function gotoNextStep() {
  currentIndex++;
  showQuestion();
}

function endGame() {
  gameRunning = false;
  clearTimeout(timer);
  for (var i = 0; i < questionResults.length; i++) {
    if (questionResults[i] === null) questionResults[i] = false;
  }
  var rate = (correctCount / totalQuestions) * 100;
  lastGameRate = rate;
  updateActionButtons();

  var row = document.getElementById("endResultRow");
  row.innerHTML = questionResults.map(function (r) {
    return r ? "✅" : "❌";
  }).join("");

  document.getElementById("endRate").innerText = rate.toFixed(0) + "%";
  document.getElementById("endOverlay").classList.add("show");
}

function closeOverlayAndStart() {
  document.getElementById("endOverlay").classList.remove("show");
  startGame();
}

function closeOverlayAndEnd() {
  document.getElementById("endOverlay").classList.remove("show");
  // 重置游戏状态并返回起始界面
  gameRunning = false;
  paused = false;
  currentIndex = 0;
  correctCount = 0;
  lastGameRate = null;
  currentLevel = 1;
  updateActionButtons();
  document.getElementById("levelTitle").innerText = LEVEL_NAMES[currentLevel];
  document.getElementById("result").innerText = "";
  document.getElementById("answerDisplay").innerText = "";
  setAreaContent("areaA", "");
  setAreaContent("areaB", "");
  // 显示起始界面
  document.getElementById("startOverlay").style.display = "flex";
}

function createKeypad() {
  var keypad = document.getElementById("keypad");
  keypad.innerHTML = "";
  for (var i = 1; i <= 9; i++) {
    var btn = document.createElement("button");
    btn.innerText = i;
    btn.onclick = (function (n) { return function () { inputNumber(n); }; })(i);
    keypad.appendChild(btn);
  }
  var empty1 = document.createElement("span");
  empty1.className = "keypad-empty";
  keypad.appendChild(empty1);
  var zero = document.createElement("button");
  zero.innerText = "0";
  zero.onclick = function () { inputNumber(0); };
  keypad.appendChild(zero);
  var empty2 = document.createElement("span");
  empty2.className = "keypad-empty";
  keypad.appendChild(empty2);
}

// 添加键盘事件监听
document.addEventListener('keydown', function(event) {
  if (!gameRunning || paused) return;
  
  // 数字键 0-9
  if (event.key >= '0' && event.key <= '9') {
    event.preventDefault();
    inputNumber(parseInt(event.key));
  }
  
  // 小键盘数字
  if (event.code >= 'Numpad0' && event.code <= 'Numpad9') {
    event.preventDefault();
    const num = parseInt(event.code.replace('Numpad', ''));
    inputNumber(num);
  }
});

createKeypad();
updateActionButtons();
</script>

</body>
</html>
