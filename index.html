<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>一溯答</title>
<style>
body {
  text-align: center;
  font-family: Arial;
  background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
  margin: 0;
  padding: 0;
}

h2 {
  margin-top: 30px;
  letter-spacing: 4px;
}

.game-container {
  display: inline-block;
  margin-top: 20px;
  padding: 20px 25px 30px;
  background: #ffffff;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
}

.areas {
  margin-bottom: 15px;
}

#areaA,
#areaB {
  font-size: 26px;
  margin: 10px 0;
  padding: 10px 15px;
  border-radius: 10px;
}

#areaA {
  background: #f5f9ff;
  border: 1px solid #c8ddff;
}

#areaB {
  background: #fffaf5;
  border: 1px solid #ffd9b3;
}

#answerDisplay {
  min-height: 24px;
  margin: 10px 0 0;
  font-size: 18px;
  color: #888;
}

#keypad {
  margin-top: 15px;
  display: inline-grid;
  grid-template-columns: repeat(3, 70px);
  grid-gap: 8px;
}

#keypad button {
  width: 70px;
  height: 70px;
  font-size: 22px;
  border-radius: 10px;
  border: none;
  background: #f3f4f6;
  box-shadow: 0 3px 0 #d1d5db;
  cursor: pointer;
  transition: all 0.1s ease;
}

#keypad button:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 #d1d5db;
}

#control {
  margin-top: 15px;
}

#control button {
  margin: 5px;
  padding: 8px 18px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  background: #4f46e5;
  color: #ffffff;
  font-size: 14px;
}

#control button:nth-child(2),
#control button:nth-child(3) {
  background: #e5e7eb;
  color: #111827;
}

#result {
  margin-top: 12px;
  min-height: 24px;
  font-size: 18px;
}
</style>
</head>

<body>

<h2>一溯答</h2>

<div class="game-container">
  <div class="areas">
    <div id="areaA"></div>
    <div id="areaB"></div>
    <div id="answerDisplay"></div>
  </div>

  <div id="keypad"></div>

  <div id="control">
    <button onclick="startGame()">开始游戏</button>
    <button onclick="pauseGame()">暂停</button>
    <button onclick="giveUp()">放弃</button>
  </div>

  <div id="result"></div>
</div>

<script>
// 溯答：看当前题，答上一题（5 题十以内加减法，5 秒一题）

let questions = [];
let currentIndex = 0; // 当前显示的是第几题（0-5），从第 2 题开始才真正作答，第 6 轮补答第 5 题
let correctCount = 0;
let timer = null;
const TIME_LIMIT = 5000; // 5 秒
let gameRunning = false;
let paused = false;
const TOTAL_QUESTIONS = 5;
const ANSWERABLE_QUESTIONS = TOTAL_QUESTIONS; // 5 题都要被答到

// 生成 5 道十以内加减法题（加数、减数、被减数、结果都在 0-10）
function generateQuestions() {
  questions = [];
  for (let i = 0; i < TOTAL_QUESTIONS; i++) {
    const isAdd = Math.random() < 0.5;
    let a, b, ans, op;

    if (isAdd) {
      op = "+";
      // a + b <= 9，且 a、b、结果都在 0-9（不出现两位数）
      a = Math.floor(Math.random() * 10); // 0-9
      b = Math.floor(Math.random() * (10 - a)); // 0-(9-a)
      ans = a + b;
    } else {
      op = "-";
      // a - b >= 0，且 a、b、结果都在 0-9（不出现两位数）
      a = Math.floor(Math.random() * 10); // 被减数 0-9
      b = Math.floor(Math.random() * (a + 1)); // 减数 0-a
      ans = a - b;
    }

    questions.push({
      a,
      b,
      op,
      text: a + " " + op + " " + b,
      answer: ans
    });
  }
}

function startGame() {
  generateQuestions();
  currentIndex = 0;
  correctCount = 0;
  gameRunning = true;
  paused = false;
  document.getElementById("result").innerText = "";
  document.getElementById("answerDisplay").innerText = "";
  showQuestion();
}

function pauseGame() {
  if (!gameRunning) return;
  paused = !paused;
  if (paused) {
    clearTimeout(timer);
  } else {
    startTimer();
  }
}

function giveUp() {
  if (!gameRunning) return;
  endGame();
}

function restartGame() {
  clearTimeout(timer);
  startGame();
}

// 辅助：根据 currentIndex 计算「要回答的是哪一题」
function getTargetInfo() {
  // currentIndex 为 0 时没有可回答的题
  if (currentIndex === 0) {
    return null;
  }
  // currentIndex 1~4：回答第 1~4 题
  if (currentIndex >= 1 && currentIndex <= TOTAL_QUESTIONS - 1) {
    return {
      targetIndex: currentIndex - 1,
      labelNumber: currentIndex // 第 N 题
    };
  }
  // currentIndex === 5：补答第 5 题
  if (currentIndex === TOTAL_QUESTIONS) {
    return {
      targetIndex: TOTAL_QUESTIONS - 1,
      labelNumber: TOTAL_QUESTIONS
    };
  }
  return null;
}

// 渲染 B 区为「问号」形式
function renderMaskedB() {
  const areaB = document.getElementById("areaB");
  const info = getTargetInfo();
  if (!info) {
    areaB.innerText = "请记住本题，下一题开始作答上一题。";
    return;
  }
  const prev = questions[info.targetIndex];
  areaB.innerText =
    "第 " + info.labelNumber + " 题： ? " + prev.op + " ? = ?";
}

// 渲染 B 区显示玩家本次尝试的答案
function renderCandidateB(ans) {
  const areaB = document.getElementById("areaB");
  const info = getTargetInfo();
  if (!info) return;
  const prev = questions[info.targetIndex];
  areaB.innerText =
    "第 " + info.labelNumber + " 题： ? " + prev.op + " ? = " + ans;
}

// 渲染 B 区为完整算式
function renderRevealedB() {
  const areaB = document.getElementById("areaB");
  const info = getTargetInfo();
  if (!info) return;
  const prev = questions[info.targetIndex];
  areaB.innerText =
    "第 " +
    info.labelNumber +
    " 题： " +
    prev.a +
    " " +
    prev.op +
    " " +
    prev.b +
    " = " +
    prev.answer;
}

// 显示当前题目与上一题（问号形式），并开始计时
function showQuestion() {
  if (!gameRunning) return;

  // 共 6 轮：0~4 显示题目，5 补答第 5 题
  if (currentIndex > TOTAL_QUESTIONS) {
    endGame();
    return;
  }

  const areaA = document.getElementById("areaA");
  const areaB = document.getElementById("areaB");

  if (currentIndex === 0) {
    // 第 1 轮：展示第 1 题，只记忆不作答
    const q0 = questions[0];
    areaA.innerText = "第 1 题： " + q0.text + " = ?";
    renderMaskedB();
  } else if (currentIndex >= 1 && currentIndex <= TOTAL_QUESTIONS - 1) {
    // 第 2~5 轮：显示当前题目，回答上一题
    const q = questions[currentIndex];
    areaA.innerText =
      "第 " + (currentIndex + 1) + " 题： " + q.text + " = ?";
    renderMaskedB();
  } else if (currentIndex === TOTAL_QUESTIONS) {
    // 第 6 轮：补答第 5 题
    areaA.innerText = "补答最后一题：请回答第 5 题的结果";
    renderMaskedB();
  }

  document.getElementById("answerDisplay").innerText = "";

  startTimer();
}

function startTimer() {
  clearTimeout(timer);
  timer = setTimeout(() => {
    // 超时：如果还没有上一题（currentIndex === 0），直接进入下一轮；
    // 否则视为该题未答对，直接进入下一轮
    if (!gameRunning) return;
    if (currentIndex === 0) {
      gotoNextStep();
    } else {
      const info = getTargetInfo();
      if (info) {
        const correctAnswer = questions[info.targetIndex].answer;
        const resultDiv = document.getElementById("result");
        resultDiv.innerText =
          "❌ 超时，正确答案是 " + correctAnswer;
      }
      setTimeout(() => {
        document.getElementById("result").innerText = "";
        gotoNextStep();
      }, 500);
    }
  }, TIME_LIMIT);
}

function inputNumber(num) {
  if (!gameRunning || paused) return;
  // 只允许在有可回答题目时作答
  const info = getTargetInfo();
  if (!info) return;

  const userAns = num; // 所有计算结果都是 0-9 的一位数
  const correctAnswer = questions[info.targetIndex].answer;

  // 显示本次尝试
  renderCandidateB(userAns);
  document.getElementById("answerDisplay").innerText =
    "本轮作答第 " + info.labelNumber + " 题";

  if (userAns === correctAnswer) {
    correctCount++;
    renderRevealedB();
    const resultDiv = document.getElementById("result");
    resultDiv.innerText =
      "✅ 第 " + info.labelNumber + " 题回答正确！";
    clearTimeout(timer);
    setTimeout(() => {
      resultDiv.innerText = "";
      gotoNextStep();
    }, 600);
  } else {
    const resultDiv = document.getElementById("result");
    resultDiv.innerText =
      "❌ 第 " + info.labelNumber + " 题回答错误";
    setTimeout(() => {
      renderMaskedB();
      resultDiv.innerText = "";
    }, 300);
  }
}

function gotoNextStep() {
  currentIndex++;
  showQuestion();
}

function endGame() {
  gameRunning = false;
  clearTimeout(timer);

  // 实际可作答题目为 TOTAL_QUESTIONS - 1（从第 2 题开始答上一题）
  const rate = (correctCount / ANSWERABLE_QUESTIONS) * 100;
  let level = "";

  if (rate === 100) {
    level = "S 级记忆大师";
  } else if (rate >= 80) {
    level = "A 级高手";
  } else if (rate >= 60) {
    level = "B 级进阶者";
  } else if (rate >= 40) {
    level = "C 级入门者";
  } else {
    level = "D 级需多练习";
  }

  document.getElementById("areaA").innerText = "游戏结束";
  document.getElementById("areaB").innerText = "";
  document.getElementById("answerDisplay").innerText = "";
  document.getElementById("result").innerText =
    "正确题数：" +
    correctCount +
    "/" +
    ANSWERABLE_QUESTIONS +
    "，正确率：" +
    rate.toFixed(0) +
    "%，等级：" +
    level;
}

function createKeypad() {
  const keypad = document.getElementById("keypad");
  keypad.innerHTML = "";

  for (let i = 1; i <= 9; i++) {
    const btn = document.createElement("button");
    btn.innerText = i;
    btn.onclick = () => inputNumber(i);
    keypad.appendChild(btn);
  }

  const zero = document.createElement("button");
  zero.innerText = 0;
  zero.onclick = () => inputNumber(0);
  keypad.appendChild(zero);

  const equal = document.createElement("button");
  equal.innerText = "=";
  equal.onclick = submitAnswer;
  keypad.appendChild(equal);
}

createKeypad();
</script>

</body>
</html>
